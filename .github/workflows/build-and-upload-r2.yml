name: Build RDK bolts and upload to R2

on:
  workflow_dispatch:
    inputs:
      build_list:
        description: 'Build list passed to gen-bolt-pkgs.sh'
        required: false
        default: 'base:bitbake,wpe:bitbake,refui:refui'
      key_format:
        description: 'Signing key format'
        required: false
        default: 'PEM'
        type: choice
        options:
          - PEM
      r2_prefix:
        description: 'R2 key prefix for uploaded artifacts'
        required: false
        default: 'rdk-bolts'

jobs:
  build-and-upload:
    environment: production-r2
    runs-on: self-hosted
    env:
      AWS_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
      BUILD_LIST: ${{ inputs.build_list }}
      KEY_FORMAT: ${{ inputs.key_format }}
      R2_PREFIX: ${{ inputs.r2_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build builder image
        run: docker build --tag bolt-builder .

      - name: Prepare signing keys
        id: prepare_keys
        env:
          RDK_PRIVATE_KEY_PEM: ${{ secrets.RDK_PRIVATE_KEY_PEM }}
          RDK_PUBLIC_KEY_PEM: ${{ secrets.RDK_PUBLIC_KEY_PEM }}
          RDK_PUBLIC_CERT_PEM: ${{ secrets.RDK_PUBLIC_CERT_PEM }}
          RDK_PRIVATE_KEY_PASSPHRASE: ${{ secrets.RDK_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"

          if [[ "$KEY_FORMAT" == "PKCS12" ]]; then
            echo "PKCS12 is not used in this workflow; use PEM key_format"
            exit 1
          fi

          if [[ -z "${RDK_PUBLIC_CERT_PEM:-}" ]]; then
            echo "Missing required secret: RDK_PUBLIC_CERT_PEM"
            exit 1
          fi

          if [[ -z "${RDK_PRIVATE_KEY_PEM:-}" ]]; then
            echo "Missing required secret for PEM: RDK_PRIVATE_KEY_PEM"
            exit 1
          fi

          if [[ -z "${RDK_PUBLIC_KEY_PEM:-}" ]]; then
            echo "Missing required secret for PEM: RDK_PUBLIC_KEY_PEM"
            exit 1
          fi

          printf '%s' "$RDK_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/keys/private_key.pem"
          printf '%s' "$RDK_PUBLIC_KEY_PEM" > "$RUNNER_TEMP/keys/public.pem"
          printf '%s' "$RDK_PUBLIC_CERT_PEM" > "$RUNNER_TEMP/keys/public-cert.pem"

          chmod 600 "$RUNNER_TEMP/keys/private_key.pem"
          chmod 600 "$RUNNER_TEMP/keys/public.pem"
          chmod 600 "$RUNNER_TEMP/keys/public-cert.pem"

          echo "key_format=PEM" >> "$GITHUB_OUTPUT"
          echo "publish_key_name=public-cert.pem" >> "$GITHUB_OUTPUT"


      - name: Build and sign packages in Docker
        env:
          PRIVATE_KEY_PASSPHRASE: ${{ secrets.RDK_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/bolts"
          docker run --rm \
            -e BUILD_LIST="$BUILD_LIST" \
            -e BOLTS_DIR=/build/bolts \
            -e MANIFEST_FILE=/build/bolts/factory-app-version.json \
            -v "$GITHUB_WORKSPACE:/build" \
            -v "$RUNNER_TEMP/keys:/build/keys:ro" \
            bolt-builder

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdk-bolt-packages
          if-no-files-found: error
          path: |
            bolts/*.bolt
            bolts/factory-app-version.json

      - name: Install AWS CLI (if missing)
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          python3 -m venv "$RUNNER_TEMP/awscli-venv"
          "$RUNNER_TEMP/awscli-venv/bin/pip" install --upgrade pip awscli
          echo "$RUNNER_TEMP/awscli-venv/bin" >> "$GITHUB_PATH"

      - name: Upload artifacts to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          aws --version
          if ! compgen -G "$GITHUB_WORKSPACE/bolts/*.bolt" > /dev/null; then
            echo "No .bolt files found in bolts/"
            exit 1
          fi

          for bolt_path in "$GITHUB_WORKSPACE"/bolts/*.bolt; do
            bolt_name="$(basename "$bolt_path")"
            bolt_key="s3://$R2_BUCKET/$R2_PREFIX/$bolt_name"
            if aws s3 ls "$bolt_key" --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
              echo "Already exists, skipping: $bolt_name"
            else
              aws s3 cp "$bolt_path" "$bolt_key" --endpoint-url "$R2_ENDPOINT"
            fi
          done
          
          publish_key_target="s3://$R2_BUCKET/$R2_PREFIX/keys/${{ steps.prepare_keys.outputs.publish_key_name }}"
          if aws s3 ls "$publish_key_target" --endpoint-url "$R2_ENDPOINT" >/dev/null 2>&1; then
            echo "Already exists, skipping: ${{ steps.prepare_keys.outputs.publish_key_name }}"
          else
            aws s3 cp "${{ steps.prepare_keys.outputs.publish_key_file }}" \
              "$publish_key_target" \
              --endpoint-url "$R2_ENDPOINT"
          fi

      - name: Cleanup key material
        if: always()
        run: |
          set -euo pipefail
          rm -f \
            "$RUNNER_TEMP/keys/private_key.pem" \
            "$RUNNER_TEMP/keys/public-cert.pem" \
            "$RUNNER_TEMP/keys/public_key.p12"
