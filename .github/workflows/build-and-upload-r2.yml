name: Build RDK bolts and upload to R2

on:
  workflow_dispatch:
    inputs:
      build_list:
        description: 'Build list passed to gen-bolt-pkgs.sh'
        required: false
        default: 'base:bitbake,wpe:bitbake,refui:refui'
      key_format:
        description: 'Signing key format'
        required: false
        default: 'PEM'
        type: choice
        options:
          - PEM
      r2_prefix:
        description: 'R2 key prefix for uploaded artifacts'
        required: false
        default: 'rdk-bolts'

jobs:
  build-and-upload:
    environment: production-r2
    runs-on: self-hosted
    env:
      AWS_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
      BUILD_LIST: ${{ inputs.build_list }}
      KEY_FORMAT: ${{ inputs.key_format }}
      R2_PREFIX: ${{ inputs.r2_prefix }}
      PUBLISH_BASE_URL: https://repo.solution57.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build builder image
        run: docker build --tag bolt-builder .

      - name: Prepare signing keys
        id: prepare_keys
        env:
          RDK_PRIVATE_KEY_PEM: ${{ secrets.RDK_PRIVATE_KEY_PEM }}
          RDK_PUBLIC_KEY_PEM: ${{ secrets.RDK_PUBLIC_KEY_PEM }}
          RDK_PUBLIC_CERT_PEM: ${{ secrets.RDK_PUBLIC_CERT_PEM }}
          RDK_PRIVATE_KEY_PASSPHRASE: ${{ secrets.RDK_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"

          if [[ "$KEY_FORMAT" == "PKCS12" ]]; then
            echo "PKCS12 is not used in this workflow; use PEM key_format"
            exit 1
          fi

          if [[ -z "${RDK_PUBLIC_CERT_PEM:-}" ]]; then
            echo "Missing required secret: RDK_PUBLIC_CERT_PEM"
            exit 1
          fi

          if [[ -z "${RDK_PRIVATE_KEY_PEM:-}" ]]; then
            echo "Missing required secret for PEM: RDK_PRIVATE_KEY_PEM"
            exit 1
          fi

          if [[ -z "${RDK_PUBLIC_KEY_PEM:-}" ]]; then
            echo "Missing required secret for PEM: RDK_PUBLIC_KEY_PEM"
            exit 1
          fi

          printf '%s' "$RDK_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/keys/private_key.pem"
          printf '%s' "$RDK_PUBLIC_KEY_PEM" > "$RUNNER_TEMP/keys/public.pem"
          printf '%s' "$RDK_PUBLIC_CERT_PEM" > "$RUNNER_TEMP/keys/public-cert.pem"

          chmod 600 "$RUNNER_TEMP/keys/private_key.pem"
          chmod 600 "$RUNNER_TEMP/keys/public.pem"
          chmod 600 "$RUNNER_TEMP/keys/public-cert.pem"

          echo "key_format=PEM" >> "$GITHUB_OUTPUT"
          echo "publish_key_name=public-cert.pem" >> "$GITHUB_OUTPUT"
          echo "publish_key_file=$RUNNER_TEMP/keys/public-cert.pem" >> "$GITHUB_OUTPUT"


      - name: Build and sign packages in Docker
        env:
          PRIVATE_KEY_PASSPHRASE: ${{ secrets.RDK_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/bolts"
          docker run --rm \
            -e BUILD_LIST="$BUILD_LIST" \
            -e BOLTS_DIR=/build/bolts \
            -e MANIFEST_FILE=/build/bolts/factory-app-version.json \
            -e KEY_FORMAT="${{ steps.prepare_keys.outputs.key_format }}" \
            -e PRIVATE_KEY_PASSPHRASE="${PRIVATE_KEY_PASSPHRASE:-}" \
            -e SIGNING_CERT_PATH=/build/keys/public-cert.pem \
            -v "$GITHUB_WORKSPACE:/build" \
            -v "$RUNNER_TEMP/keys:/build/keys:ro" \
            bolt-builder

      - name: Rewrite manifest for platform
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.parse import quote

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          bolts_dir = workspace / "bolts"
          base_url = os.environ["PUBLISH_BASE_URL"].rstrip("/")
          prefix = os.environ["R2_PREFIX"].strip("/")
          publish_key_name = os.environ["PUBLISH_KEY_NAME"]
          publish_key_file = Path(os.environ["PUBLISH_KEY_FILE"])

          bolt_files = sorted(bolts_dir.glob("*.bolt"))
          if not bolt_files:
              raise SystemExit("No .bolt files found in bolts/")
          if not publish_key_file.is_file():
              raise SystemExit(f"Publish key file not found: {publish_key_file}")

          manifest = []
          for bolt_file in bolt_files:
              name = bolt_file.name
              sha = hashlib.sha256(bolt_file.read_bytes()).hexdigest()
              manifest.append({
                  "packagename": name,
                  "srcuri": f"{base_url}/{prefix}/{quote(name, safe='')}",
                  "sha256sum": sha,
                  "installpath": "/etc/rdk/factoryapps",
              })

          cert_sha = hashlib.sha256(publish_key_file.read_bytes()).hexdigest()
          manifest.append({
              "packagename": publish_key_name,
              "srcuri": f"{base_url}/{prefix}/keys/{quote(publish_key_name, safe='')}",
              "sha256sum": cert_sha,
              "installpath": "/etc/rdk/certs",
          })

          output = bolts_dir / "factory-app-version.json"
          output.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          print(f"Wrote manifest: {output}")
          PY
        env:
          PUBLISH_KEY_NAME: ${{ steps.prepare_keys.outputs.publish_key_name }}
          PUBLISH_KEY_FILE: ${{ steps.prepare_keys.outputs.publish_key_file }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdk-bolt-packages
          if-no-files-found: error
          path: |
            bolts/*.bolt
            bolts/factory-app-version.json

      - name: Install AWS CLI (if missing)
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          python3 -m venv "$RUNNER_TEMP/awscli-venv"
          "$RUNNER_TEMP/awscli-venv/bin/pip" install --upgrade pip awscli
          echo "$RUNNER_TEMP/awscli-venv/bin" >> "$GITHUB_PATH"

      - name: Upload artifacts to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          aws --version
          if ! compgen -G "$GITHUB_WORKSPACE/bolts/*.bolt" > /dev/null; then
            echo "No .bolt files found in bolts/"
            exit 1
          fi

          uploaded_bolt_count=0
          for bolt_path in "$GITHUB_WORKSPACE"/bolts/*.bolt; do
            bolt_name="$(basename "$bolt_path")"
            bolt_key="$R2_PREFIX/$bolt_name"
            if aws s3api head-object --bucket "$R2_BUCKET" --key "$bolt_key" --endpoint-url "$R2_ENDPOINT" 2>/dev/null; then
              echo "Skipping $bolt_name (already exists in R2)"
            else
              aws s3 cp "$bolt_path" "s3://$R2_BUCKET/$bolt_key" --endpoint-url "$R2_ENDPOINT"
              uploaded_bolt_count=$((uploaded_bolt_count + 1))
            fi
          done

          cert_key="$R2_PREFIX/keys/${{ steps.prepare_keys.outputs.publish_key_name }}"
          if aws s3api head-object --bucket "$R2_BUCKET" --key "$cert_key" --endpoint-url "$R2_ENDPOINT" 2>/dev/null; then
            echo "Skipping cert (already exists in R2)"
          else
            aws s3 cp "${{ steps.prepare_keys.outputs.publish_key_file }}" \
              "s3://$R2_BUCKET/$cert_key" \
              --endpoint-url "$R2_ENDPOINT"
          fi

          if [[ "$uploaded_bolt_count" -gt 0 ]]; then
            ts="$(date -u +%Y%m%dT%H%M%SZ)"
            manifest_name="factory-app-version-${ts}.json"
            aws s3 cp "$GITHUB_WORKSPACE/bolts/factory-app-version.json" \
              "s3://$R2_BUCKET/$R2_PREFIX/${manifest_name}" \
              --endpoint-url "$R2_ENDPOINT"
            echo "Uploaded manifest: ${manifest_name}"
          else
            echo "No new bolt uploads, skipping manifest upload."
          fi

      - name: Cleanup key material
        if: always()
        run: |
          set -euo pipefail
          rm -f \
            "$RUNNER_TEMP/keys/private_key.pem" \
            "$RUNNER_TEMP/keys/public-cert.pem" \
            "$RUNNER_TEMP/keys/public_key.p12"
