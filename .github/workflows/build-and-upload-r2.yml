name: Build RDK bolts and upload to R2

on:
  workflow_dispatch:
    inputs:
      build_list:
        description: 'Build list passed to gen-bolt-pkgs.sh'
        required: false
        default: 'base:bitbake,wpe:bitbake,refui:refui'
      key_format:
        description: 'Signing key format'
        required: false
        default: 'PEM'
        type: choice
        options:
          - PEM
          - PKCS12
      r2_prefix:
        description: 'R2 key prefix for uploaded artifacts'
        required: false
        default: 'rdk-bolts'

jobs:
  build-and-upload:
    environment: production-r2
    runs-on: self-hosted
    env:
      AWS_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
      BUILD_LIST: ${{ inputs.build_list }}
      KEY_FORMAT: ${{ inputs.key_format }}
      R2_PREFIX: ${{ inputs.r2_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build builder image
        run: docker build --tag bolt-builder .

      - name: Prepare signing keys
        id: prepare_keys
        env:
          RDK_PRIVATE_KEY_PEM: ${{ secrets.RDK_PRIVATE_KEY_PEM }}
          RDK_PUBLIC_KEY_PEM: ${{ secrets.RDK_PUBLIC_KEY_PEM }}
          RDK_PRIVATE_KEY_PASSPHRASE: ${{ secrets.RDK_PRIVATE_KEY_PASSPHRASE }}
          RDK_SIGNING_P12_BASE64: ${{ secrets.RDK_SIGNING_P12_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/rdk-keys"
          chmod 700 "$RUNNER_TEMP/rdk-keys"

          if [[ "$KEY_FORMAT" == "PKCS12" ]]; then
            if [[ -z "${RDK_SIGNING_P12_BASE64:-}" ]]; then
              echo "Missing required secret for PKCS12: RDK_SIGNING_P12_BASE64"
              exit 1
            fi
            printf '%s' "$RDK_SIGNING_P12_BASE64" | base64 -d > "$RUNNER_TEMP/rdk-keys/signing.p12"
            cp "$RUNNER_TEMP/rdk-keys/signing.p12" "$RUNNER_TEMP/rdk-keys/public_key.p12"
            chmod 600 "$RUNNER_TEMP/rdk-keys/signing.p12" "$RUNNER_TEMP/rdk-keys/public_key.p12"
            if [[ -n "${RDK_PUBLIC_KEY_PEM:-}" ]]; then
              printf '%s' "$RDK_PUBLIC_KEY_PEM" > "$RUNNER_TEMP/rdk-keys/public.pem"
              chmod 600 "$RUNNER_TEMP/rdk-keys/public.pem"
              publish_key_file="$RUNNER_TEMP/rdk-keys/public.pem"
              publish_key_name="public.pem"
            else
              openssl pkcs12 \
                -in "$RUNNER_TEMP/rdk-keys/signing.p12" \
                -nokeys \
                -clcerts \
                -passin "pass:${RDK_PRIVATE_KEY_PASSPHRASE:-}" \
                -out "$RUNNER_TEMP/rdk-keys/public-cert.pem"
              chmod 600 "$RUNNER_TEMP/rdk-keys/public-cert.pem"
              publish_key_file="$RUNNER_TEMP/rdk-keys/public-cert.pem"
              publish_key_name="public-cert.pem"
            fi
            echo "private_key_path=/secrets/signing.p12" >> "$GITHUB_OUTPUT"
            echo "public_key_path=/secrets/public_key.p12" >> "$GITHUB_OUTPUT"
            echo "key_format=PKCS12" >> "$GITHUB_OUTPUT"
            echo "publish_key_file=$publish_key_file" >> "$GITHUB_OUTPUT"
            echo "publish_key_name=$publish_key_name" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${RDK_PRIVATE_KEY_PEM:-}" ]]; then
            echo "Missing required secret for PEM: RDK_PRIVATE_KEY_PEM"
            exit 1
          fi

          printf '%s' "$RDK_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/rdk-keys/private_key.pem"
          chmod 600 "$RUNNER_TEMP/rdk-keys/private_key.pem"

          if [[ -n "${RDK_PUBLIC_KEY_PEM:-}" ]]; then
            printf '%s' "$RDK_PUBLIC_KEY_PEM" > "$RUNNER_TEMP/rdk-keys/public.pem"
          else
            if [[ -n "${RDK_PRIVATE_KEY_PASSPHRASE:-}" ]]; then
              openssl pkey \
                -in "$RUNNER_TEMP/rdk-keys/private_key.pem" \
                -passin "pass:${RDK_PRIVATE_KEY_PASSPHRASE}" \
                -pubout \
                -out "$RUNNER_TEMP/rdk-keys/public.pem"
            else
              openssl pkey \
                -in "$RUNNER_TEMP/rdk-keys/private_key.pem" \
                -pubout \
                -out "$RUNNER_TEMP/rdk-keys/public.pem"
            fi
          fi
          chmod 600 "$RUNNER_TEMP/rdk-keys/public.pem"
          echo "private_key_path=/secrets/private_key.pem" >> "$GITHUB_OUTPUT"
          echo "public_key_path=/secrets/public.pem" >> "$GITHUB_OUTPUT"
          echo "key_format=PEM" >> "$GITHUB_OUTPUT"
          echo "publish_key_file=$RUNNER_TEMP/rdk-keys/public.pem" >> "$GITHUB_OUTPUT"
          echo "publish_key_name=public.pem" >> "$GITHUB_OUTPUT"

      - name: Build and sign packages in Docker
        env:
          PRIVATE_KEY_PASSPHRASE: ${{ secrets.RDK_PRIVATE_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/bolts"
          docker run --rm \
            -e PRIVATE_KEY_PATH="${{ steps.prepare_keys.outputs.private_key_path }}" \
            -e PUBLIC_KEY_PATH="${{ steps.prepare_keys.outputs.public_key_path }}" \
            -e PRIVATE_KEY_PASSPHRASE="${PRIVATE_KEY_PASSPHRASE:-}" \
            -e KEY_FORMAT="${{ steps.prepare_keys.outputs.key_format }}" \
            -e BUILD_LIST="$BUILD_LIST" \
            -e BOLTS_DIR=/build/bolts \
            -v "$GITHUB_WORKSPACE:/build" \
            -v "$RUNNER_TEMP/rdk-keys:/secrets:ro" \
            bolt-builder

      - name: Upload artifacts to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if ! compgen -G "$GITHUB_WORKSPACE/bolts/*.bolt" > /dev/null; then
            echo "No .bolt files found in bolts/"
            exit 1
          fi

          aws s3 cp "$GITHUB_WORKSPACE/bolts/" "s3://$R2_BUCKET/$R2_PREFIX/" \
            --recursive \
            --endpoint-url "$R2_ENDPOINT"

          aws s3 cp "${{ steps.prepare_keys.outputs.publish_key_file }}" \
            "s3://$R2_BUCKET/$R2_PREFIX/keys/${{ steps.prepare_keys.outputs.publish_key_name }}" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Cleanup key material
        if: always()
        run: |
          set -euo pipefail
          rm -f \
            "$RUNNER_TEMP/rdk-keys/private_key.pem" \
            "$RUNNER_TEMP/rdk-keys/public.pem" \
            "$RUNNER_TEMP/rdk-keys/public-cert.pem" \
            "$RUNNER_TEMP/rdk-keys/signing.p12" \
            "$RUNNER_TEMP/rdk-keys/public_key.p12"
